<!DOCTYPE html>

  <title>Cassandra Zamora's Enchanted Debut RSVP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffe6f0, #ffd6e8);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #ff3399; /* Elegant pink */
      position: relative;
    }

    .rsvp-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 51, 153, 0.3);
      width: 380px;
      z-index: 1;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      color: #ff3399;
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
      color: #ff3399;
    }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff3399;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff66b2;
    }

    #message {
      margin-top: 20px;
      font-weight: bold;
      color: #ff3399;
    }

    /* Elegant sparkle effect */
    .sparkle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, #fff 0%, #ff99cc 70%, transparent 100%);
      border-radius: 50%;
      opacity: 0.8;
      animation: sparkleAnim linear infinite;
    }

    @keyframes sparkleAnim {
      0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0.8; }
      50% { transform: translateY(-200px) translateX(30px) scale(1); opacity: 0.3; }
      100% { transform: translateY(0) translateX(-30px) scale(0.5); opacity: 0.8; }
    }
  </style>
</head>
